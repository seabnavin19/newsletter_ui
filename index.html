<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Signal — Daily Intelligence Briefing</title>
  <script>
    /* Set theme before CSS loads to avoid flash */
    (function(){
      var t=localStorage.getItem('ais-theme')||'dark';
      document.documentElement.setAttribute('data-theme',t);
      document.documentElement.classList.add('no-transition');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <polygon points="16,2 29,9 29,23 16,30 3,23 3,9" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
          <polygon points="16,8 23,12 23,20 16,24 9,20 9,12" stroke="var(--accent)" stroke-width="0.5" fill="none" opacity="0.4"/>
          <circle cx="16" cy="16" r="4" fill="var(--accent)"/>
        </svg>
      </div>
      <div class="brand-info">
        <span class="brand-name">AI Signal</span>
        <span class="brand-sub">Daily Briefing</span>
      </div>
    </div>

    <div class="date-widget">
      <div class="date-label" id="sidebar-date">—</div>
      <div class="date-row">
        <button class="ctrl-btn" id="prev-btn" title="Previous day">‹</button>
        <select id="date-select" aria-label="Select date"></select>
        <button class="ctrl-btn" id="next-btn" title="Next day">›</button>
      </div>
    </div>

    <nav class="section-nav" id="sidebar-nav"></nav>

    <div class="sidebar-foot">
      <span class="live-dot"></span>
      <span class="live-text">Signal Active</span>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="top-bar">
      <div class="bar-left">
        <button class="hamburger" id="menu-btn" aria-label="Toggle navigation">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="currentColor">
            <rect width="18" height="2" rx="1"/>
            <rect y="6" width="18" height="2" rx="1"/>
            <rect y="12" width="18" height="2" rx="1"/>
          </svg>
        </button>
        <div class="bar-title-group">
          <span class="bar-pub">Intelligence Briefing</span>
          <span class="bar-sep">·</span>
          <span class="bar-date" id="top-date">—</span>
        </div>
      </div>
      <div class="bar-right">
        <div class="bar-stats" id="top-stats"></div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <svg class="ico-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="ico-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="content-area" id="content">
      <div class="blank-state">
        <div class="blank-spinner">⬡</div>
        <span>Loading briefing…</span>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
